name: 界面 / 体验反馈
description: 对页面样式、交互、音效或兼容性有问题或建议
labels: ["界面"]
body:
  - type: dropdown
    id: type
    attributes:
      label: 反馈类型
      options:
        - 样式 / 排版问题
        - 交互体验问题
        - 音效问题
        - 移动端适配问题
        - 浏览器兼容性问题
        - 功能建议
        - 其他
    validations:
      required: true

  - type: textarea
    id: detail
    attributes:
      label: 具体描述
      description: 请说明你遇到的问题或你的建议，附截图更佳
      placeholder: 比如「手机上按钮太小点不到」
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: 设备 / 浏览器
      description: 你使用的设备和浏览器
      placeholder: "iPhone 15 / Safari 18"
    validations:
      required: false

  - type: textarea
    id: screenshot
    attributes:
      label: 截图（可选）
      description: 拖拽或粘贴截图到此处
    validations:
      required: false
