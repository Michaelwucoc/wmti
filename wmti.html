<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WMTI · By AWMC TEAM ver 2026-04-10</title>
  <style>
    :root {
      --bg: #f5f7fa;
      --card: #ffffff;
      --text: #1a1a2e;
      --sub: #6b7280;
      --primary: #5468ff;
      --primary-2: #7c6cff;
      --line: #e5e7eb;
      --shadow: 0 1px 4px rgba(0,0,0,0.06);
      --radius: 14px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .container { max-width: 1080px; margin: 0 auto; padding: 24px; }

    .hero {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 20px;
      align-items: stretch;
      margin-top: 10px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero-main { padding: 32px; }

    .badge {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 999px;
      background: rgba(84,104,255,0.08);
      color: var(--primary);
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(26px, 4vw, 42px);
      line-height: 1.2;
    }

    .lead { color: var(--sub); font-size: 15px; margin-bottom: 18px; }

    .hero-actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 16px; align-items: center; }

    button, .btn {
      border: 0;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease, opacity .15s ease;
    }

    button:hover:not(:disabled), .btn:hover:not(:disabled) { transform: translateY(-1px); }
    button:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 2px 8px rgba(84,104,255,0.18);
    }

    .btn-secondary {
      background: var(--card);
      color: var(--primary);
      border: 1px solid var(--line);
    }

    .image-slot {
      min-height: 100%;
      padding: 18px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      border: 2px dashed var(--line);
      background: rgba(84,104,255,0.02);
      border-radius: var(--radius);
      color: var(--primary);
      font-weight: 700;
    }

    .image-slot small { display: block; color: var(--sub); font-weight: 500; margin-top: 8px; }

    .section { margin-top: 24px; }
    .section-title { font-size: 22px; margin: 0 0 8px; }
    .section-sub { margin: 0 0 16px; color: var(--sub); }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .info-card { padding: 20px; }

    .mini-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 14px;
    }

    .mini-item {
      padding: 12px;
      border-radius: 10px;
      background: #f8f9fc;
      border: 1px solid var(--line);
      text-align: center;
      font-size: 13px;
    }

    .mini-item strong { display: block; font-size: 16px; color: var(--primary); margin-bottom: 4px; }

    .test-wrap { padding: 24px; }

    .progress-wrap {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .progress {
      flex: 1;
      min-width: 140px;
      height: 8px;
      background: #eef0f4;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: var(--primary);
      transition: width .35s cubic-bezier(.22,1,.36,1);
    }

    .page-step {
      font-size: 13px;
      font-weight: 700;
      color: var(--primary);
      background: rgba(84,104,255,0.06);
      padding: 5px 12px;
      border-radius: 999px;
      border: 1px solid rgba(84,104,255,0.12);
    }

    .quiz-page { display: none; animation: fadeSlide .3s ease; }
    .quiz-page.active { display: block; }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .block-title {
      font-size: 15px;
      font-weight: 800;
      color: var(--primary);
      margin: 0 0 14px;
      padding-bottom: 8px;
      border-bottom: 2px solid rgba(84,104,255,0.12);
    }

    .question {
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 12px;
      margin-bottom: 12px;
      background: #fff;
    }

    .question h3 { font-size: 16px; margin: 0 0 10px; line-height: 1.45; }

    .options { display: grid; gap: 8px; }

    label.option {
      display: block;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #fafbfd;
      cursor: pointer;
      transition: all .15s ease;
    }

    label.option:hover { border-color: rgba(84,104,255,0.35); background: #fff; }
    label.option:has(input:checked) {
      border-color: var(--primary);
      background: rgba(84,104,255,0.04);
      box-shadow: 0 0 0 1.5px rgba(84,104,255,0.18);
    }

    input[type="radio"] { margin-right: 10px; accent-color: var(--primary); vertical-align: middle; }

    .pager {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
      align-items: center;
    }

    .sound-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--sub);
      user-select: none;
    }

    .sound-toggle input { accent-color: var(--primary); }

    .hidden { display: none !important; }

    .result { display: none; padding: 24px; }
    .result.active { display: block; animation: fadeSlide .4s ease; }

    .result-top { display: grid; grid-template-columns: 1fr 300px; gap: 16px; }

    .result-main, .result-side { padding: 22px; }

    .type-code {
      font-size: clamp(32px, 5vw, 60px);
      line-height: 1;
      margin: 6px 0 10px;
      color: var(--primary);
      font-weight: 900;
      letter-spacing: 4px;
    }

    .type-code.pop {
      animation: typePop .7s cubic-bezier(.34,1.56,.64,1) both;
    }

    @keyframes typePop {
      0% { transform: scale(.2) rotate(-6deg); opacity: 0; filter: blur(6px); }
      60% { transform: scale(1.06) rotate(1deg); opacity: 1; filter: blur(0); }
      100% { transform: scale(1) rotate(0); }
    }

    .type-name { font-size: 22px; font-weight: 800; margin-bottom: 8px; }

    .pill-row { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; }

    .pill {
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 13px;
      background: rgba(84,104,255,0.06);
      color: var(--primary);
      border: 1px solid rgba(84,104,255,0.12);
      font-weight: 700;
    }

    .score-bars { display: grid; gap: 10px; }

    .score-item {
      background: #f8f9fc;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
    }

    .score-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 6px;
      color: var(--sub);
      font-weight: 700;
    }

    .bar { height: 8px; border-radius: 999px; background: #eef0f4; overflow: hidden; }

    .bar > span {
      display: block;
      height: 100%;
      width: 50%;
      background: var(--primary);
      border-radius: 999px;
      transition: width .8s cubic-bezier(.22,1,.36,1);
    }

    .desc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }

    .desc-card { padding: 20px; }
    .desc-card h4 { margin: 0 0 10px; font-size: 17px; }

    ul.clean { margin: 0; padding-left: 18px; }

    .sparkle {
      pointer-events: none;
      position: fixed;
      inset: 0;
      z-index: 50;
      overflow: hidden;
    }

    .sparkle span {
      position: absolute;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--primary);
      opacity: 0;
      animation: sparkleFall 1.2s ease-out forwards;
    }

    @keyframes sparkleFall {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(100vh) scale(0.2); opacity: 0; }
    }

    .site-footer {
      margin-top: 36px;
      padding: 18px 0;
      text-align: center;
      font-size: 13px;
      color: var(--sub);
      border-top: 1px solid var(--line);
    }

    .site-footer a { color: var(--primary); text-decoration: none; }
    .site-footer a:hover { text-decoration: underline; }

    .corner-links {
      position: fixed;
      right: 18px;
      bottom: 18px;
      display: flex;
      gap: 10px;
      z-index: 40;
    }

    .corner-links a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--card);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      color: var(--sub);
      transition: color .15s, border-color .15s;
    }

    .corner-links a:hover { color: var(--primary); border-color: var(--primary); }
    .corner-links svg { width: 20px; height: 20px; }

    @media (max-width: 900px) {
      .hero, .result-top, .desc-grid { grid-template-columns: 1fr; }
      .mini-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 560px) {
      .container { padding: 16px; }
      .hero-main, .test-wrap, .result, .info-card { padding: 16px; }
      .mini-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

    const AUDIO = {

    function getAudio(src, loop) {
      const el = new Audio(src);
      el.loop = !!loop;
      el.preload = 'auto';
      return el;
    }

    function stopWaiting() {
      if (waitingEl) {
        waitingEl.pause();
        waitingEl.currentTime = 0;
      }
    }

    function playWaiting() {
      if (!soundOn.checked) return;
      stopSfxExcept('waiting');
      if (!waitingEl) waitingEl = getAudio(AUDIO.waiting, false);
      waitingEl.volume = 0.45;
      waitingEl.play().catch(() => {});
    }

    function stopSfxExcept(keep) {
      if (keep !== 'waiting') stopWaiting();
      if (keep !== 'insert' && insertEl) {
        insertEl.pause();
        insertEl.currentTime = 0;
      }
      if (keep !== 'summary' && summaryEl) {
        summaryEl.pause();
        summaryEl.currentTime = 0;
      }
    }

    function playInsert() {
      if (!soundOn.checked) return;
      if (summaryEl) {
        summaryEl.pause();
        summaryEl.currentTime = 0;
      }
      if (!insertEl) insertEl = getAudio(AUDIO.insert, false);
      insertEl.pause();
      insertEl.currentTime = 0;
      insertEl.volume = 0.7;
      insertEl.play().catch(() => {});
    }

    function playGameSummary() {
      if (!soundOn.checked) return;
      if (insertEl) {
        insertEl.pause();
        insertEl.currentTime = 0;
      }
      if (!summaryEl) summaryEl = getAudio(AUDIO.summary, false);
      summaryEl.pause();
      summaryEl.currentTime = 0;
      summaryEl.volume = 0.75;
      summaryEl.play().catch(() => {});
    }

    function ensureAudio() {
      if (!audioCtx) {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (AC) audioCtx = new AC();
      }
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    }

    /** 短促「判定」感：两声叠频 */
    function playTap(kind) {
      if (!soundOn.checked) return;
      ensureAudio();
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const freqs = kind === 'submit' ? [523.25, 783.99] : [440, 659.25];
      freqs.forEach((f, i) => {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = f;
        g.gain.setValueAtTime(0.0001, now);
        g.gain.exponentialRampToValueAtTime(0.12 - i * 0.03, now + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, now + 0.09 + i * 0.02);
        osc.connect(g);
        g.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + 0.12);
      });
    }

    function sectionQuestions(idx) {
      const s = SECTIONS[idx];
      return questions.filter(q => q.id >= s.start && q.id <= s.end);
    }

    function renderAllPages() {
      quizPagesEl.innerHTML = SECTIONS.map((sec, idx) => {
        const qs = sectionQuestions(idx);
        const inner = qs.map(q => {
          let optionsHtml = '';
          const options = [
            { key: 'a', label: 'A', prop: 'optionA' },
            { key: 'b', label: 'B', prop: 'optionB' },
            { key: 'c', label: 'C', prop: 'optionC' },
            { key: 'd', label: 'D', prop: 'optionD' },
            { key: 'e', label: 'E', prop: 'optionE' }
          ];
          for (const opt of options) {
            if (q[opt.prop]) {
              optionsHtml += `
                <label class="option">
                  <input
                    type="radio"
                    name="q${q.id}"
                    value="${opt.key}"
                    data-umami-event="q${q.id}"
                    data-umami-event-option="${opt.key}"
                    data-umami-event-section="${sec.title}"
                    data-umami-event-page="${idx + 1}"
                  /> ${opt.label}. ${q[opt.prop]}
                </label>
              `;
            }
          }
          return `
            <div class="question" data-qid="${q.id}">
              <h3>Q${q.id}. ${q.text}</h3>
              <div class="options">
                ${optionsHtml}
              </div>
            </div>
          `;
        }).join('');
        return `<div class="quiz-page${idx === 0 ? ' active' : ''}" data-page="${idx}">
          <div class="block-title">${sec.title}</div>
          ${inner}
        </div>`;
      }).join('');

      quizPagesEl.querySelectorAll('input[type="radio"]').forEach(input => {
        input.addEventListener('change', () => {
          playTap('tick');
          updateProgress();
        });
      });
      updatePager();
    }

    function showPage(idx) {
      currentPage = Math.max(0, Math.min(SECTIONS.length - 1, idx));
      quizPagesEl.querySelectorAll('.quiz-page').forEach((el, i) => {
        el.classList.toggle('active', i === currentPage);
      });
      pageStep.textContent = `第 ${currentPage + 1} / ${SECTIONS.length} 组`;
      updatePager();
      updateProgress();
    }

    function countAnswered() {
      return questions.filter(q => document.querySelector(`input[name="q${q.id}"]:checked`)).length;
    }

    function pageComplete(pageIdx) {
      return sectionQuestions(pageIdx).every(q => document.querySelector(`input[name="q${q.id}"]:checked`));
    }

    function updateProgress() {
      const n = countAnswered();
      progressText.textContent = `${n} / ${questions.length}`;
      progressBar.style.width = `${(n / questions.length) * 100}%`;
      updatePager();
    }

    function updatePager() {
      const prev = document.getElementById('prevBtn');
      const next = document.getElementById('nextBtn');
      const sub = document.getElementById('submitBtn');
      prev.disabled = currentPage === 0;
      const last = currentPage === SECTIONS.length - 1;
      next.classList.toggle('hidden', last);
      sub.classList.toggle('hidden', !last);
      if (!last) {
        next.disabled = !pageComplete(currentPage);
      } else {
        sub.disabled = countAnswered() < questions.length;
      }
    }

    function addSparkles() {

      layer.innerHTML = '';
      for (let i = 0; i < 36; i++) {
        const s = document.createElement('span');

        s.style.animationDelay = `${Math.random() * 0.3}s`;
        layer.appendChild(s);
      }
      setTimeout(() => { layer.innerHTML = ''; }, 1300);
    }

    function aggregateScores() {
      const score = { S: 0, P: 0, F: 0, C: 0, lone: 0, soc: 0, E: 0, M: 0 };
      for (const q of questions) {
        const checked = document.querySelector(`input[name="q${q.id}"]:checked`);
        if (!checked) return null;
        let pack;
        if (checked.value === 'a') pack = q.a;
        else if (checked.value === 'b') pack = q.b;
        else if (checked.value === 'c') pack = q.c;
        else if (checked.value === 'd') pack = q.d;
        else if (checked.value === 'e') pack = q.e;
        Object.keys(pack).forEach(k => { score[k] += pack[k]; });
      }
      const c1 = score.S >= score.P ? 'S' : 'P';
      const c2 = score.F >= score.C ? 'F' : 'C';
      const c3 = score.lone >= score.soc ? 'L' : 'S';
      const c4 = score.E >= score.M ? 'E' : 'M';
      const type = c1 + c2 + c3 + c4;
      return { score, type };
    }

        : '';
      document.getElementById('resultCover').innerHTML = `
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:18px;text-align:center;">
          ${coverImg}
          <p style="margin:0;font-size:13px;color:var(--sub);">你的舞萌人格曲绘是</p>
          <p style="margin:4px 0 0;font-size:16px;font-weight:800;color:var(--primary);">${songEntry.song}</p>
        </div>
      `;

      const s = result.score;
      const pSP = barPercent(s.S, s.P);
      const pFC = barPercent(s.F, s.C);
      const pLS = barPercent(s.lone, s.soc);
      const pEM = barPercent(s.E, s.M);

      document.getElementById('scoreBars').innerHTML = `
        <div class="score-item">
          <div class="score-label"><span>${scoreLabels.SP.left}</span><span>${scoreLabels.SP.right}</span></div>
          <div class="bar"><span style="width:${pSP}%"></span></div>
        </div>
        <div class="score-item">
          <div class="score-label"><span>${scoreLabels.FC.left}</span><span>${scoreLabels.FC.right}</span></div>
          <div class="bar"><span style="width:${pFC}%"></span></div>
        </div>
        <div class="score-item">
          <div class="score-label"><span>${scoreLabels.LS.left}</span><span>${scoreLabels.LS.right}</span></div>
          <div class="bar"><span style="width:${pLS}%"></span></div>
        </div>
        <div class="score-item">
          <div class="score-label"><span>${scoreLabels.EM.left}</span><span>${scoreLabels.EM.right}</span></div>
          <div class="bar"><span style="width:${pEM}%"></span></div>
        </div>
      `;

      resultSection.classList.add('active');
      playGameSummary();
      addSparkles();
      resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function restartAll() {
      stopSfxExcept('');
      document.querySelectorAll('input[type="radio"]').forEach(i => { i.checked = false; });
      resultSection.classList.remove('active');
      currentPage = 0;
      renderAllPages();
      showPage(0);
      updateProgress();
      document.getElementById('testSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    document.getElementById('nextBtn').addEventListener('click', () => {
      if (!pageComplete(currentPage)) return;
      playInsert();
      showPage(currentPage + 1);
    });

    document.getElementById('prevBtn').addEventListener('click', () => {
      playTap('tick');
      showPage(currentPage - 1);
    });

    function saveAnswers() {
      const answers = {};
      questions.forEach(q => {
        const checked = document.querySelector(`input[name="q${q.id}"]:checked`);
        if (checked) answers[q.id] = checked.value;
      });
      localStorage.setItem('wmti_answers', JSON.stringify(answers));
    }

    function loadAnswers() {
      try {
        const raw = localStorage.getItem('wmti_answers');
        if (!raw) return null;
        return JSON.parse(raw);
      } catch { return null; }
    }

    function applySavedAnswers(answers) {
      Object.entries(answers).forEach(([id, val]) => {
        const input = document.querySelector(`input[name="q${id}"][value="${val}"]`);
        if (input) input.checked = true;
      });
    }

    document.getElementById('submitBtn').addEventListener('click', () => {
      const result = aggregateScores();
      if (!result) {
        alert('还有题目没选完，请补全再生成结果。');
        return;
      }
      saveAnswers();
      document.getElementById('retestBtn').classList.remove('hidden');
      stopSfxExcept('');
      playTap('submit');
      fillResult(result);
    });

    function doRestart() {
      localStorage.removeItem('wmti_answers');
      document.getElementById('retestBtn').classList.add('hidden');
      playTap('tick');
      restartAll();
    }

    document.getElementById('restartBtn').addEventListener('click', doRestart);
    document.getElementById('againBtn').addEventListener('click', doRestart);
    document.getElementById('retestBtn').addEventListener('click', doRestart);

    soundOn.addEventListener('change', () => {
      if (!soundOn.checked) stopSfxExcept('');
    });

    document.getElementById('copyBtn').addEventListener('click', async () => {
      const type = document.getElementById('typeCode').textContent;
      const name = document.getElementById('typeName').textContent;
      const summary = document.getElementById('typeSummary').textContent;
      const quote = document.getElementById('typeQuote').textContent;
      const text = `我的 WMTI 结果是 ${type}｜${name}\n${summary}\n${quote}\n在 https://wmti.awmc.cc 参与测试！`;
      try {
        await navigator.clipboard.writeText(text);
        alert('结果文案已复制。');
      } catch {
        alert('复制失败，请手动复制。');
      }
    });

    renderAllPages();
    showPage(0);
    updateProgress();

    const saved = loadAnswers();
    if (saved && Object.keys(saved).length > 0) {
      applySavedAnswers(saved);
      updateProgress();
      document.getElementById('retestBtn').classList.remove('hidden');
      if (countAnswered() === questions.length) {
        const result = aggregateScores();
        if (result) fillResult(result);
      }
    }
  </script>
</body>
</html>
